# Defaults only -- deployment-specific values (instances, ACR) live in
# aks/values.local.yaml, copied from aks/values.example.yaml. No passwords
# anywhere: they live in each instance's own Azure Key Vault and are
# resolved at runtime (see templates/keyvault.yaml for the naming
# convention).

# Strimzi-compatible Connect image built from aks/Dockerfile.connect and
# pushed to ACR with aks/scripts/build-push-connect-image.sh,
# e.g. myacr.azurecr.io/cdc-kafka-connect:3.9-cdc1. Required.
connectImage: ""

# Disk per Kafka broker (3 brokers, replication factor 3). Must hold 7 days
# -- the rollback window -- of change volume for ALL instances, plus
# headroom. A full broker disk silently ends the rollback window: alert on
# it. Azure Disk CSI supports online expansion if this proves too small.
kafkaStorageSize: 256Gi
kafkaStorageClass: managed-csi-premium

# One entry per database instance -- see aks/values.example.yaml. Includes
# each instance's original MySQL rollback target (minus password) and its
# own Key Vault reference, declared up front so a rollback needs nothing
# but the instance name. Instances can use entirely different vaults --
# nothing here is shared between them, and an instance whose vault secrets
# aren't ready yet has no effect on any other instance. `enabled: false`
# (default true) lets you declare an instance ahead of its vault being
# populated: it renders no SecretProviderClass, no Key Vault mount on the
# shared Connect pod, and no connector, so it can never block the Connect
# cluster (or any other instance) from becoming Ready.
instances: []

# EMERGENCY ONLY. Leave empty during normal operation; set at rollback time
# by scripts/deploy-rollback-sink.sh. A listed instance name deploys a JDBC
# sink that REPLAYS THE CHANGE LOG INTO THE ORIGINAL SOURCE MYSQL declared
# in that instance's mysql block.
rollback: []
