{{- /*
One Debezium source connector per enabled instance. Per-instance topic
prefix (cdc-<name>) is what keeps rollbacks isolated: each rollback sink
consumes only its own instance's topics. Same convention as the Docker
setup (scripts/deploy-postgres-source.sh).

Passwords are never templated here -- ${directory:...} placeholders are
resolved inside the Connect workers from that instance's own Key Vault CSI
mount (templates/keyvault.yaml, one per instance).
*/}}
{{- range .Values.instances }}
{{- if not (regexMatch "^[a-z][a-z0-9]*$" .name) }}
{{- fail (printf "instance name %q must match ^[a-z][a-z0-9]*$ -- it is used in topic prefixes, Postgres slot/publication names (cdc_<name>) and Key Vault secret names (cdc-<name>-...)" .name) }}
{{- end }}
{{- if ne .enabled false }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: postgres-source-{{ .name }}
  labels:
    strimzi.io/cluster: cdc-connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    database.hostname: {{ .postgres.host | quote }}
    database.port: {{ .postgres.port | quote }}
    database.user: {{ .postgres.user | quote }}
    # Filename is objectAlias from keyvault.yaml (stable); KV object name
    # may differ via postgres.passwordSecret.
    database.password: '${directory:/mnt/keyvault-{{ .name }}:postgres-password}'
    database.dbname: {{ .postgres.dbname | quote }}
    topic.prefix: cdc-{{ .name }}
    # Slot/publication default to cdc_<name>; set postgres.slotName /
    # postgres.publicationName per instance when the server was provisioned
    # with different names (e.g. scripts/cdc_setup.sql's <DB_NAME>_cdc_slot /
    # <DB_NAME>_cdc_publication). The publication must already exist on the
    # server (see aks/README.md "Prerequisites").
    slot.name: {{ .postgres.slotName | default (printf "cdc_%s" .name) }}
    publication.name: {{ .postgres.publicationName | default (printf "cdc_%s" .name) }}
    publication.autocreate.mode: disabled
    plugin.name: pgoutput
    # Debezium 3.x name for what 2.x (the Compose stack's
    # connectors/postgres-source.json) calls `never`: no snapshot, stream
    # only changes made after the connector starts.
    snapshot.mode: no_data
    # Defense in depth: never stream pg_chameleon replica-metadata tables
    # even if they were accidentally left in the publication.
    schema.exclude.list: sch_chameleon
    tombstones.on.delete: "true"
    decimal.handling.mode: precise
    time.precision.mode: connect
    heartbeat.interval.ms: "10000"
    heartbeat.action.query: 'UPDATE cdc.debezium_heartbeat SET ts = now() WHERE id = 1'
    slot.drop.on.stop: "false"
{{- end }}
{{- end }}
{{- /*
EMERGENCY ONLY: rollback sinks. .Values.rollback is a list of instance
names, set solely via scripts/deploy-rollback-sink.sh. Connection details
come from the instance's mysql block; the password comes from Key Vault at
runtime. Config mirrors connectors/mysql-sink-standby.json merged with the
active transforms from connectors/type-transforms.json (unwrap +
routeTopic), with the topic regexes adjusted for the per-instance prefix
and the heartbeat topic excluded (its table exists only in Postgres --
replaying it would fail the sink, since auto.create is off).
The inactive per-column transform templates (boolToTinyInt, tsTzToDatetime,
enumWorkaround) still live in type-transforms.json -- if validation showed
you need one, add it here before a real rollback.
*/}}
{{- range $name := .Values.rollback }}
{{- $inst := dict }}
{{- range $.Values.instances }}{{- if eq .name $name }}{{- $inst = . }}{{- end }}{{- end }}
{{- if not $inst.name }}
{{- fail (printf "rollback entry %q does not match any instance name" $name) }}
{{- end }}
{{- if eq $inst.enabled false }}
{{- fail (printf "instance %q is not enabled (instances[].enabled=false) -- its Key Vault mount doesn't exist on the Connect cluster, so it cannot be rolled back until enabled" $name) }}
{{- end }}
{{- $mysql := required (printf "instance %q has no mysql block in values -- the rollback target must be declared" $name) $inst.mysql }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: mysql-rollback-sink-{{ $name }}
  labels:
    strimzi.io/cluster: cdc-connect
spec:
  class: io.confluent.connect.jdbc.JdbcSinkConnector
  tasksMax: 1
  config:
    topics.regex: '^cdc-{{ $name }}\.(?!cdc\.debezium_heartbeat$).*$'
    connection.url: 'jdbc:mysql://{{ $mysql.host }}:{{ $mysql.port }}/{{ $mysql.dbname }}?useSSL=true&serverTimezone=UTC'
    connection.user: {{ $mysql.user | quote }}
    connection.password: '${directory:/mnt/keyvault-{{ $name }}:mysql-password}'
    insert.mode: upsert
    pk.mode: record_key
    auto.create: "false"
    auto.evolve: "false"
    delete.enabled: "true"
    table.name.format: '${topic}'
    numeric.mapping: none
    transforms: unwrap,routeTopic
    transforms.unwrap.type: io.debezium.transforms.ExtractNewRecordState
    # Debezium 3.x replacement for 2.x's drop.tombstones=true +
    # delete.handling.mode=none (still used in type-transforms.json, which
    # runs against the Compose stack's Debezium 2.4): DELETE events become
    # null-value tombstones (-> SQL DELETE via the sink's delete.enabled)
    # and Debezium's own compaction tombstones are dropped.
    transforms.unwrap.delete.tombstone.handling.mode: delete-to-tombstone
    transforms.routeTopic.type: org.apache.kafka.connect.transforms.RegexRouter
    transforms.routeTopic.regex: '^cdc-{{ $name }}\.[^.]+\.(.+)$'
    transforms.routeTopic.replacement: '$1'
{{- end }}
