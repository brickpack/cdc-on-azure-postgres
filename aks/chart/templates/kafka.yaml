# Shared Kafka cluster for all five CDC instances, managed by the Strimzi
# operator (KRaft mode -- no ZooKeeper, unlike the Docker Compose stack).
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  labels:
    strimzi.io/cluster: cdc-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .Values.kafkaStorageSize }}
        class: {{ .Values.kafkaStorageClass }}
        kraftMetadata: shared
        # Keep the disks (= the rollback log) even if the cluster resource is
        # deleted by accident.
        deleteClaim: false
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      memory: 4Gi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: cdc-kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.9.0
    metadataVersion: 3.9-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # docker-compose.yml runs replication factor 1 because it is a single
      # node. Three brokers here, so full durability:
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      # 168 hours = 7 days. This is the rollback window: any Postgres change
      # older than this has been deleted from the log and can no longer be
      # replayed into MySQL. Same value as docker-compose.yml -- see the main
      # README "When NOT to rollback".
      log.retention.hours: 168
      auto.create.topics.enable: true
