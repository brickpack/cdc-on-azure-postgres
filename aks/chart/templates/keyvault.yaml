# One SecretProviderClass per enabled instance, each pointed at that
# instance's own Azure Key Vault (name/tenant/identity can all differ
# between instances -- see ../../README.md "Design decisions"). Mounted
# into the Connect pods (tmpfs) via the AKS Key Vault CSI add-on, one mount
# per instance (templates/kafka-connect.yaml). Connector configs reference
# them with ${directory:/mnt/keyvault-<name>:...}, so passwords never
# appear in Helm values, Kubernetes Secrets, or the Connect config topic.
#
# Key Vault object names default to cdc-<name>-postgres-password /
# cdc-<name>-mysql-password, but may be overridden per instance when the
# vault already stores passwords under other names:
#   postgres.passwordSecret / mysql.passwordSecret in values.local.yaml
# objectAlias keeps the on-disk filename stable so connectors always read
# postgres-password / mysql-password under /mnt/keyvault-<name>/.
# Secret *values* must currently be the raw password string (not JSON).
{{- range .Values.instances }}
{{- if ne .enabled false }}
{{- $pgSecret := .postgres.passwordSecret | default (printf "cdc-%s-postgres-password" .name) }}
{{- $mySecret := .mysql.passwordSecret | default (printf "cdc-%s-mysql-password" .name) }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cdc-{{ .name }}-keyvault
spec:
  provider: azure
  parameters:
    keyvaultName: {{ required (printf "instances[%s].keyVault.name is required -- set it in aks/values.local.yaml" .name) .keyVault.name | quote }}
    tenantId: {{ required (printf "instances[%s].keyVault.tenantId is required" .name) .keyVault.tenantId | quote }}
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ required (printf "instances[%s].keyVault.identityClientId is required (the Key Vault CSI add-on identity's clientId)" .name) .keyVault.identityClientId | quote }}
    objects: |
      array:
        - |
          objectName: {{ $pgSecret }}
          objectType: secret
          objectAlias: postgres-password
        - |
          objectName: {{ $mySecret }}
          objectType: secret
          objectAlias: mysql-password
{{- end }}
{{- end }}

