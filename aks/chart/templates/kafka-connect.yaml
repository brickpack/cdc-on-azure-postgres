{{- /*
Collect enabled instances once. When none are enabled, volumes/volumeMounts
must be explicit empty arrays ([]). A bare `volumes:` key serializes as
null and KafkaConnect rejects it (server-side apply).
*/}}
{{- $enabled := list }}
{{- range .Values.instances }}
{{- if ne .enabled false }}
{{- $enabled = append $enabled . }}
{{- end }}
{{- end }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: cdc-connect
  annotations:
    # Lets Strimzi manage connectors declaratively from the KafkaConnector
    # resources in connectors.yaml instead of REST API calls.
    strimzi.io/use-connector-resources: "true"
spec:
  # Single replica fits 3x D2ds_v4 with 3 brokers; raise to 2 when on D4ds_v4+.
  replicas: 1
  # Strimzi-compatible image built from aks/Dockerfile.connect (NOT the
  # Compose ../Dockerfile -- Strimzi needs its own base image and plugin
  # layout) and pushed to ACR. Run aks/scripts/build-push-connect-image.sh
  # before first deploy or whenever Dockerfile.connect changes.
  image: {{ required "connectImage is required -- set it in aks/values.local.yaml" .Values.connectImage }}
  bootstrapServers: cdc-kafka-kafka-bootstrap:9092
  # Required on kafka.strimzi.io/v1 (were under spec.config as group.id /
  # *.storage.topic on v1beta2). Same names as docker-compose.yml.
  groupId: cdc-rollback-connect-cluster
  configStorageTopic: cdc-connect-configs
  offsetStorageTopic: cdc-connect-offsets
  statusStorageTopic: cdc-connect-status
  config:
    # Internal-topic RF raised from 1 (Compose single broker) to 3.
    config.storage.replication.factor: 3
    offset.storage.replication.factor: 3
    status.storage.replication.factor: 3
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: "true"
    value.converter.schemas.enable: "true"
    # Resolves ${directory:/mnt/keyvault-<name>:<file>} placeholders in
    # connector configs from each enabled instance's Key Vault CSI mount at
    # runtime, so passwords never enter the Connect config topic.
    config.providers: directory
    config.providers.directory.class: org.apache.kafka.common.config.provider.DirectoryConfigProvider
  resources:
    requests:
      cpu: "500m"
      memory: 1536Mi
    limits:
      memory: 1536Mi
  # One Key Vault mount per enabled instance, each read-only as tmpfs files
  # -- see templates/keyvault.yaml. An instance with `enabled: false` gets
  # no volume/mount here at all, so its vault never needs to be populated
  # for this Connect cluster (or any other instance) to become Ready.
  template:
    pod:
{{- if $enabled }}
      volumes:
{{- range $enabled }}
        - name: keyvault-{{ .name }}
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: cdc-{{ .name }}-keyvault
{{- end }}
{{- else }}
      volumes: []
{{- end }}
    connectContainer:
{{- if $enabled }}
      volumeMounts:
{{- range $enabled }}
        - name: keyvault-{{ .name }}
          mountPath: /mnt/keyvault-{{ .name }}
{{- end }}
{{- else }}
      volumeMounts: []
{{- end }}
