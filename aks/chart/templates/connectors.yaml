{{- /*
One Debezium source connector per instance. Per-instance topic prefix
(cdc-<name>) is what keeps rollbacks isolated: each rollback sink consumes
only its own instance's topics. The Docker single-instance setup uses the
bare prefix "cdc" instead.

Passwords are never templated here -- ${directory:...} placeholders are
resolved inside the Connect workers from the Key Vault CSI mount
(templates/keyvault.yaml).
*/}}
{{- range .Values.instances }}
{{- if not (regexMatch "^[a-z][a-z0-9]*$" .name) }}
{{- fail (printf "instance name %q must match ^[a-z][a-z0-9]*$ -- it is used in topic prefixes, Postgres slot/publication names (cdc_<name>) and Key Vault secret names (cdc-<name>-...)" .name) }}
{{- end }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: postgres-source-{{ .name }}
  labels:
    strimzi.io/cluster: cdc-connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    database.hostname: {{ .postgres.host | quote }}
    database.port: {{ .postgres.port | quote }}
    database.user: {{ .postgres.user | quote }}
    database.password: '${directory:/mnt/keyvault:cdc-{{ .name }}-postgres-password}'
    database.dbname: {{ .postgres.dbname | quote }}
    topic.prefix: cdc-{{ .name }}
    # Fixed naming convention: create the publication as cdc_<name> on each
    # server (see aks/README.md "Prerequisites"). Debezium creates the slot.
    slot.name: cdc_{{ .name }}
    publication.name: cdc_{{ .name }}
    publication.autocreate.mode: disabled
    plugin.name: pgoutput
    snapshot.mode: never
    tombstones.on.delete: "true"
    decimal.handling.mode: precise
    time.precision.mode: connect
    heartbeat.interval.ms: "10000"
    heartbeat.action.query: 'UPDATE cdc.debezium_heartbeat SET ts = now() WHERE id = 1'
    slot.drop.on.stop: "false"
{{- end }}
{{- /*
EMERGENCY ONLY: rollback sinks. .Values.rollback is a list of instance
names, set solely via scripts/deploy-rollback-sink.sh. Connection details
come from the instance's mysql block; the password comes from Key Vault at
runtime. Config mirrors connectors/mysql-sink-standby.json merged with the
active transforms from connectors/type-transforms.json (unwrap +
routeTopic), with the topic regexes adjusted for the per-instance prefix.
The inactive per-column transform templates (boolToTinyInt, tsTzToDatetime,
enumWorkaround) still live in type-transforms.json -- if validation showed
you need one, add it here before a real rollback.
*/}}
{{- range $name := .Values.rollback }}
{{- $inst := dict }}
{{- range $.Values.instances }}{{- if eq .name $name }}{{- $inst = . }}{{- end }}{{- end }}
{{- if not $inst.name }}
{{- fail (printf "rollback entry %q does not match any instance name" $name) }}
{{- end }}
{{- $mysql := required (printf "instance %q has no mysql block in values -- the rollback target must be declared" $name) $inst.mysql }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: mysql-rollback-sink-{{ $name }}
  labels:
    strimzi.io/cluster: cdc-connect
spec:
  class: io.confluent.connect.jdbc.JdbcSinkConnector
  tasksMax: 1
  config:
    topics.regex: 'cdc-{{ $name }}\..*'
    connection.url: 'jdbc:mysql://{{ $mysql.host }}:{{ $mysql.port }}/{{ $mysql.dbname }}?useSSL=true&serverTimezone=UTC'
    connection.user: {{ $mysql.user | quote }}
    connection.password: '${directory:/mnt/keyvault:cdc-{{ $name }}-mysql-password}'
    insert.mode: upsert
    pk.mode: record_key
    auto.create: "false"
    auto.evolve: "false"
    delete.enabled: "true"
    table.name.format: '${topic}'
    numeric.mapping: none
    transforms: unwrap,routeTopic
    transforms.unwrap.type: io.debezium.transforms.ExtractNewRecordState
    transforms.unwrap.drop.tombstones: "true"
    transforms.unwrap.delete.handling.mode: none
    transforms.routeTopic.type: org.apache.kafka.connect.transforms.RegexRouter
    transforms.routeTopic.regex: '^cdc-{{ $name }}\.[^.]+\.(.+)$'
    transforms.routeTopic.replacement: '$1'
{{- end }}
