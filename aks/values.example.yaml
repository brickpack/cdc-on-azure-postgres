# Copy to aks/values.local.yaml and fill in real values (gitignored).
# NO PASSWORDS GO IN THIS FILE — only Key Vault *secret names* (and usernames).
#
# Default KV object names (used when creating secrets, or when the vault
# already follows this convention):
#   cdc-<name>-postgres-password  →  password for postgres.user
#   cdc-<name>-mysql-password     →  password for mysql.user
# If the vault already has different names, set postgres.passwordSecret /
# mysql.passwordSecret to those object names. Secret *values* must be the
# raw password string (not a JSON blob) until we learn otherwise.
#
# Different instances can use entirely different vaults (different name/
# tenant/identity in that instance's keyVault: block below). Only an
# instance's own two secrets need to exist, in its own vault, before THAT
# instance is enabled -- see `enabled` below.

# Strimzi-compatible image built from aks/Dockerfile.connect and pushed to
# ACR. Build and push with: aks/scripts/build-push-connect-image.sh
connectImage: PLACEHOLDER_ACR_LOGIN_SERVER/cdc-kafka-connect:3.9-cdc1

# One entry per database instance. name must match ^[a-z][a-z0-9]*$ -- it
# becomes the Kafka topic prefix (cdc-<name>) and default slot/publication
# (cdc_<name>). It is NOT required to match existing Key Vault secret names
# (override those with passwordSecret below).
#
# keyVault is this instance's own vault. identityClientId is the Key Vault
# CSI add-on identity (same identity can read multiple vaults, as long as
# it's been granted secret-get on each one):
#   az aks show -g <rg> -n <cluster> \
#     --query addonProfiles.azureKeyvaultSecretsProvider.identity.clientId -o tsv
#
# enabled (default true) gates whether this instance's SecretProviderClass,
# Connect volume mount, and source connector render at all. Add a new
# instance with `enabled: false` while its vault is still being populated --
# it has zero effect on the shared Connect cluster or any other instance
# until you flip it to true.
#
# The mysql block is that instance's ORIGINAL source MySQL -- the rollback
# target. Declaring it here (password excluded) means a rollback needs
# nothing but the instance name.
instances:
  - name: billing
    enabled: true
    keyVault:
      name: PLACEHOLDER_VAULT_NAME
      tenantId: PLACEHOLDER_TENANT_ID
      identityClientId: PLACEHOLDER_IDENTITY_CLIENT_ID
    postgres:
      host: PLACEHOLDER.postgres.database.azure.com
      port: "5432"
      user: PLACEHOLDER_USER
      dbname: PLACEHOLDER_DBNAME
      # Optional. Key Vault secret *name* (object name) holding the password
      # for postgres.user. Default: cdc-<name>-postgres-password
      # passwordSecret: PLACEHOLDER_EXISTING_PG_SECRET_NAME
      # Optional. Writable role for scripts/simulate-shop-load.sh only (not
      # used by Connect). Default secret: cdc-<name>-postgres-load-password
      # loadUser: PLACEHOLDER_LOAD_USER
      # loadPasswordSecret: PLACEHOLDER_EXISTING_LOAD_SECRET_NAME
      # Optional. Slot/publication names default to cdc_<name>; set these if
      # the server was provisioned with scripts/cdc_setup.sql's convention
      # (<DB_NAME>_cdc_slot / <DB_NAME>_cdc_publication) or any other names.
      # slotName: PLACEHOLDER_DBNAME_cdc_slot
      # publicationName: PLACEHOLDER_DBNAME_cdc_publication
    mysql:
      host: PLACEHOLDER.mysql.database.azure.com
      port: "3306"
      user: PLACEHOLDER_USER
      dbname: PLACEHOLDER_DBNAME
      # Optional. Key Vault secret *name* for mysql.user's password.
      # Default: cdc-<name>-mysql-password
      # passwordSecret: PLACEHOLDER_EXISTING_MYSQL_SECRET_NAME
  # - name: orders               # a second instance -- can be a different vault entirely
  #   enabled: false             # flip true once its two secrets exist in its own vault
  #   keyVault:
  #     name: PLACEHOLDER2_VAULT_NAME
  #     tenantId: PLACEHOLDER2_TENANT_ID
  #     identityClientId: PLACEHOLDER2_IDENTITY_CLIENT_ID
  #   postgres:
  #     ...
  #   mysql:
  #     ...

# EMERGENCY ONLY -- always leave this empty here. It is set at rollback time
# by scripts/deploy-rollback-sink.sh (a list of instance names), never by
# hand in this file.
rollback: []
